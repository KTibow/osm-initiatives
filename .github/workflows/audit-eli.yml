name: Audit ELI availability

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Update ELI submodule
        run: git submodule update --remote vendor/editor-layer-index

      - name: Audit ELI layers
        run: uv run scripts/audit_eli_availability.py

      - name: Commit availability data
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Update ELI availability data
          file_pattern: data/eli-availability.json vendor/editor-layer-index

      # - name: Trigger Pages deploy
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #   run: gh workflow run deploy-pages.yml
